# Mapeamento downloads → ISS (complementa documentation.md na raiz).
# Sem entrada válida para uma pasta de .vtt → não publicar conteúdo dessa pasta.
version: 1
defaults:
  lesson_order_from: aula_number_in_filename
  vtt_glob: "Aula_*_*.vtt"
mappings:
  - folder: Projeto_de_Bloco_Fundamentos_do_Processamento_de_Dados
    discipline: projeto-bloco
    lesson_order_from: aula_number_in_filename
  - folder: Fluencia_em_IA
    discipline: fluencia-ia
    lesson_order_from: aula_number_in_filename
  - folder: Introducao_a_Programacao_com_Python
    discipline: python
    lesson_order_from: aula_number_in_filename
  - folder: Introducao_a_Visualizacao_de_Dados_e_SQL
    discipline: visualizacao-sql
    lesson_order_from: aula_number_in_filename
  - folder: Planejamento_de_Curso_e_Carreira
    discipline: planejamento-curso-carreira
    lesson_order_from: aula_number_in_filename
  - folder: Python_para_Processamento_de_Dados
    discipline: python-processamento-dados
    lesson_order_from: aula_number_in_filename
  - folder: SQL_e_Modelagem_Relacional
    discipline: sql-modelagem-relacional
    lesson_order_from: aula_number_in_filename
