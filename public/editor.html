<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — ISS</title>
  <link rel="icon" href="css/images/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/editor-panel.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
  <link rel="stylesheet" href="css/code-editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">
  <header class="iss-header flex items-center justify-between px-4 md:px-6 sticky top-0 z-10">
    <div class="flex items-center gap-4">
      <a href="../index.html" class="font-semibold iss-link no-underline">ISS</a>
      <span class="iss-text-muted text-sm">Editor isolado</span>
    </div>
    <a href="stats.html" class="iss-link text-sm">Estatísticas</a>
  </header>

  <div id="app-layout" class="flex-1 flex flex-col min-h-0 editor-open">
    <div id="editor-panel" aria-label="Editor de código">
      <div class="editor-panel__header">
        <h2 class="text-lg font-semibold iss-text-foreground m-0">Editor de código</h2>
        <button type="button" id="iss-panel-run-btn" class="iss-exercise-action-btn">Executar código</button>
      </div>
      <div class="editor-panel__body">
        <p id="iss-panel-python-loader" class="text-sm iss-text-muted hidden">Carregando ambiente Python...</p>
        <div class="iss-code-editor-container" aria-label="Editor Python">
          <div class="iss-editor-toolbar">
            <div class="iss-editor-toolbar__left">
              <span class="iss-editor-toolbar__cursor" id="iss-editor-cursor-pos">Ln 1, Col 1</span>
            </div>
            <div class="iss-editor-toolbar__right">
              <label for="iss-editor-theme" class="sr-only">Tema do editor</label>
              <select id="iss-editor-theme" class="iss-editor-theme-select">
                <option value="material-darker">Material Darker</option>
                <option value="default">Default</option>
              </select>
            </div>
          </div>
          <div id="iss-panel-code-editor-container"></div>
        </div>
        <div class="iss-io-grid">
          <div class="stdin-container">
            <label for="iss-panel-stdin-input">Entrada (stdin)</label>
            <textarea
              id="iss-panel-stdin-input"
              class="iss-stdin-input"
              placeholder="Um valor por linha ou separados por espaço. Ex.: 5 7 ou 5&#10;7"
              rows="3"
            ></textarea>
          </div>
          <section class="mt-4" aria-live="polite">
            <div class="flex items-center justify-between mb-2">
              <h3 class="text-base font-semibold">Saída</h3>
              <button type="button" id="iss-panel-clear-output-btn" class="iss-exercise-action-btn text-xs px-2 py-1">Limpar</button>
            </div>
            <pre id="iss-panel-output" class="iss-python-output">Pronto para executar.</pre>
          </section>
        </div>
      </div>
    </div>
  </div>

  <footer class="py-6 px-4 md:px-6 border-t iss-border text-center text-sm iss-text-muted">
    Projeto de apoio à revisão — INFNET · <a href="about.html" class="iss-link-muted">Sobre</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/anyword-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="js/code-editor.js" defer></script>
  <script src="js/code-runner.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var container = document.getElementById('iss-panel-code-editor-container');
      if (container && typeof initCodeEditor === 'function') {
        initCodeEditor(container, '');
      }

      var runBtn = document.getElementById('iss-panel-run-btn');
      var loaderEl = document.getElementById('iss-panel-python-loader');
      var outputEl = document.getElementById('iss-panel-output');
      var clearOutputBtn = document.getElementById('iss-panel-clear-output-btn');

      if (typeof setPyRunnerStatusCallback === 'function') {
        setPyRunnerStatusCallback(function (status) {
          if (!loaderEl) return;
          if (status) {
            loaderEl.textContent = status;
            loaderEl.classList.remove('hidden');
          } else {
            loaderEl.classList.add('hidden');
          }
        });
      }

      function setRunningState(isRunning) {
        if (runBtn) runBtn.disabled = isRunning;
      }

      if (clearOutputBtn && outputEl) {
        clearOutputBtn.addEventListener('click', function () {
          outputEl.textContent = '';
        });
      }

      if (runBtn) {
        runBtn.addEventListener('click', async function () {
          if (typeof runPython !== 'function') return;
          setRunningState(true);
          if (outputEl) outputEl.textContent = 'Executando...';
          try {
            if (typeof issClearErrorHighlights === 'function') issClearErrorHighlights();
            var code = typeof getEditorCode === 'function' ? getEditorCode() : '';
            var stdinEl = document.getElementById('iss-panel-stdin-input');
            var stdinRaw = stdinEl ? stdinEl.value : '';
            var stdinValues = stdinRaw.trim() ? stdinRaw.trim().split(/\s+/).filter(Boolean) : [];
            var result = await runPython(code, stdinValues);
            if (outputEl) {
              if (result.error) outputEl.textContent = result.error;
              else outputEl.textContent = result.stdout || '(sem saída)';
            }
            if (result && result.error && typeof issHighlightErrorLine === 'function') {
              var match = String(result.error).match(/File \"<exec>\", line (\d+)/);
              if (match) {
                var lineNum = parseInt(match[1], 10);
                if (!isNaN(lineNum)) issHighlightErrorLine(lineNum, 'Erro de execução na linha ' + lineNum);
              }
            }
          } finally {
            setRunningState(false);
          }
        });
      }
    });
  </script>
</body>
</html>
